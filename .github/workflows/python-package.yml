name: Publish to PyPI

on:
  release:
    types: [created]

permissions: {}

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish
