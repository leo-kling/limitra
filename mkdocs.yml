site_name: Limitra
site_description: Simple, framework-agnostic rate limiting for Python
repo_url: https://github.com/leo-kling/limitra
repo_name: limitra

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Reference: getting-started/reference.md
  - Guide:
    - Decorator: guide/decorator.md
    - Algorithms: guide/algorithms.md
    - Backends & Keys: guide/backends.md
    - Error Handling: guide/error-handling.md
  - Integrations:
    - FastAPI: integrations/fastapi.md
    - Flask: integrations/flask.md
    - Django: integrations/django.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
